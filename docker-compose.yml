services:
  postgres:
    image: postgres:16-alpine
    container_name: twon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: twon
      POSTGRES_PASSWORD: twon_dev
      POSTGRES_DB: twon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twon -d twon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: twon_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: twon
      MONGO_INITDB_ROOT_PASSWORD: twon_dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: twon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  redis_data:
